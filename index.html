<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Arena - Kazi TV</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            -webkit-user-select: none; user-select: none; 
            -webkit-touch-callout: none; 
        }
        body { background: #0b0e14; font-family: 'DM Sans', sans-serif; }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .4; transform: scale(.8); } }
        ::-webkit-scrollbar { display: none; }

        .card {
            background: #131a28;
            border-radius: 16px;
            padding: 16px;
            margin-top: 15px;
            border: 1px solid #1e2c42;
            position: relative;
            overflow: hidden;
        }
        .live-border { border: 1px solid #ff406066; }
        .match-info-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            margin: 12px -16px -16px -16px;
            padding: 10px 16px;
            border-top: 1px solid #1e2c42;
            font-size: 11px;
            color: #5a6a85;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const pad = n => String(n).padStart(2,"0");

        function LiveDot() {
            return (
                <div style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,64,96,.12)",border:"1px solid rgba(255,64,96,.45)",borderRadius:50,padding:"4px 10px"}}>
                    <div style={{width:6,height:6,borderRadius:"50%",background:"#ff4060",boxShadow:"0 0 6px #ff4060",animation:"blink 1s infinite"}}/>
                    <span style={{fontFamily:"'Bebas Neue'",fontSize:13,letterSpacing:2,color:"#ff4060"}}>LIVE</span>
                </div>
            );
        }

        function TeamBlock({ team, sport }) {
            const color = sport === "cricket" ? "#00b4d8" : "#f72585";
            return (
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
                    <div style={{width:44,height:44,borderRadius:"50%",background:"#1c2638",border:`1px solid ${color}44`,display:"flex",alignItems:"center",justifyContent:"center",color:color,fontFamily:"'Bebas Neue'",fontSize:14}}>{team.abbr}</div>
                    <div style={{fontSize:11,fontWeight:600,color:"#dde6f5",textAlign:"center",maxWidth:80}}>{team.name}</div>
                </div>
            );
        }

        function App() {
            const [matches, setMatches] = useState([]);
            const [loading, setLoading] = useState(true);
            const [now, setNow] = useState(new Date());

            useEffect(() => {
                fetch('tv.json')
                    .then(res => res.json())
                    .then(data => { setMatches(data); setLoading(false); })
                    .catch(err => console.error(err));
                
                const timer = setInterval(() => setNow(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            if (loading) return <div style={{color:'#5a6a85',textAlign:'center',marginTop:'50px'}}>লোড হচ্ছে...</div>;

            return (
                <div style={{padding:"0 16px 60px"}}>
                    <div style={{maxWidth:480, margin:"0 auto"}}>
                        
                        {/* Header */}
                        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, background:"#0b0e14", padding:"20px 0 12px", borderBottom:"1px solid #1e2c42", zIndex:100, marginBottom:10}}>
                            <div style={{fontFamily:"'Bebas Neue'", fontSize:26, letterSpacing:4, background:"linear-gradient(90deg,#3b9eff,#a78bfa)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent"}}>LIVE ARENA</div>
                            <div style={{fontFamily:"'Bebas Neue'", fontSize:20, color:"#3b9eff"}}>{pad(now.getHours())}:{pad(now.getMinutes())}:{pad(now.getSeconds())}</div>
                        </div>

                        {matches.map(m => (
                            <div key={m.id} className={`card ${m.live ? 'live-border' : ''}`}>
                                {/* Top Bar */}
                                <div style={{display:"flex", justifyContent:"space-between", marginBottom:12, fontSize:10, textTransform:"uppercase", color:"#5a6a85", fontWeight:700, letterSpacing:1}}>
                                    <span>{m.league}</span>
                                    <span style={{color: m.sport==='cricket'?'#00b4d8':'#f72585'}}>{m.type}</span>
                                </div>

                                {/* Match Content */}
                                <div style={{display:"grid", gridTemplateColumns:"1fr auto 1fr", alignItems:"center", gap:10}}>
                                    <TeamBlock team={m.home} sport={m.sport} />
                                    <div style={{textAlign:"center"}}>
                                        {m.live ? <LiveDot /> : <div style={{fontFamily:"'Bebas Neue'", fontSize:18, color:"#2a3550"}}>VS</div>}
                                    </div>
                                    <TeamBlock team={m.away} sport={m.sport} />
                                </div>

                                {/* Match Bottom Info Bar (New) */}
                                <div className="match-info-bar">
                                    <span>📅 {m.date}</span>
                                    <span>⏰ {m.startTime} - {m.endTime}</span>
                                    <span style={{color:"#3b9eff"}}>⏳ {m.duration}</span>
                                </div>
                            </div>
                        ))}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
